<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Elena</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #070710, #0a0a1a);
    color: white;
}

.header {
    text-align: center;
    padding: 50px 20px;
}

.header h1 {
    font-size: 70px;
    color: #ff2ea6;
    text-shadow: 0 0 30px #ff2ea6, 0 0 60px #ff2ea6;
}

.status {
    margin-top: 10px;
    color: #00ffc8;
    font-size: 18px;
}

.main-box {
    max-width: 900px;
    margin: 40px auto;
    padding: 40px;
    border-radius: 25px;
    background: rgba(20,20,40,0.7);
    box-shadow: 0 0 40px rgba(255,46,166,0.5);
    text-align: center;
}

.player-placeholder {
    height: 200px;
    border-radius: 15px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-size: 18px;
    border: 2px dashed #ff2ea6;
}

.buttons {
    margin-top: 30px;
}

.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 10px;
    background: #ff2ea6;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-size: 18px;
    box-shadow: 0 0 20px #ff2ea6;
}

.footer {
    text-align: center;
    margin-top: 40px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
    <h1>🎧 RADIO ELENA</h1>
    <div class="status">🔴 UŽIVO 24/7</div>
</div>

<div class="main-box">

    <div class="player-placeholder">
        🎵 Ovde će ići player uskoro
    </div>

    <div class="buttons">
        <a class="btn" href="#">▶ PUSTI</a>
        <a class="btn" href="#">⏸ STOP</a>
    </div>

</div>

<div class="footer">
    Slušaj Radio Elena gde god da si ❤️
</div>

</body>
</html>
