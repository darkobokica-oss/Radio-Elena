<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Elena</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
    text-align: center;
}

h1 {
    font-size: 50px;
    color: #ff2ea6;
    text-shadow: 0 0 20px #ff2ea6;
}

.player-box {
    margin: 40px auto;
    padding: 30px;
    width: 350px;
    border-radius: 20px;
    background: #0a0015;
    box-shadow: 0 0 30px #ff2ea6;
}

img {
    width: 100%;
    border-radius: 15px;
}

.song {
    margin-top: 15px;
    font-size: 20px;
    color: #ff2ea6;
}

audio {
    width: 100%;
    margin-top: 20px;
}

.status {
    margin-top: 10px;
    color: #00ffcc;
}
</style>
</head>

<body>

<h1>🎧 RADIO ELENA</h1>
<div class="status">🔴 UŽIVO 24/7</div>

<div class="player-box">
    <img src="https://i.imgur.com/8Km9tLL.png">

    <div class="song" id="song">
        Učitavanje pesme...
    </div>

    <audio controls autoplay>
        <source src="https://stream1.srvnetplus.com:18153/;" type="audio/mpeg">
    </audio>
</div>

<script>
// Fake trenutno svira (možemo kasnije povezati pravi)
const songs = [
"Elena XO - Do kraja sveta",
"Vukan Jovanovic - Noć gori",
"Luka XO - Ona zove me",
"Radio Elena - Najbolji hitovi"
];

function changeSong() {
    const random = songs[Math.floor(Math.random() * songs.length)];
    document.getElementById("song").innerText = random;
}

setInterval(changeSong, 5000);
changeSong();
</script>

</body>
</html>
