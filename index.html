<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Elena</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
    text-align: center;
}

/* NASLOV */
h1 {
    color: #ff2ea6;
    margin-top: 50px;
    font-size: 45px;
    text-shadow: 0 0 20px #ff2ea6;
}

.status {
    color: #00ffcc;
    margin-bottom: 30px;
}

/* PLAYER BOX */
.player-box {
    margin: auto;
    width: 90%;
    max-width: 400px;
    padding: 20px;
    border-radius: 20px;
    background: #0a0015;
    box-shadow: 0 0 40px #ff2ea6;
}

/* SLIKA */
.cover {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* PESMA */
.song {
    font-size: 18px;
    color: #ff2ea6;
    margin-bottom: 10px;
}

/* AUDIO */
audio {
    width: 100%;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    color: #ccc;
}
</style>
</head>

<body>

<h1>🎧 RADIO ELENA</h1>
<div class="status">🔴 UŽIVO 24/7</div>

<div class="player-box">

<img class="cover" src="https://i.imgur.com/8Km9tLL.png">

<div class="song" id="song">
🎶 Radio svira...
</div>

<audio controls>
    <source src="https://stream1.srvnetplus.com:18153/stream" type="audio/mpeg">
</audio>

</div>

<div class="footer">
Slušaj Radio Elena gde god da si ❤️
</div>

<script>
// FAKE naziv pesme (da izgleda kao Spotify)
const songs = [
"Elena XO - Do kraja sveta",
"Vukan Jovanovic - Noć gori",
"Luka XO - Ona zove me",
"Radio Elena - Najbolji hitovi"
];

function changeSong() {
    const random = songs[Math.floor(Math.random() * songs.length)];
    document.getElementById("song").innerText = "🎶 " + random;
}

setInterval(changeSong, 5000);
changeSong();
</script>

</body>
</html>
