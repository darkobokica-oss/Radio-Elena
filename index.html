<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Radio Elena</title>
    
    <meta property="og:title" content="Radio Elena" />
    <meta property="og:description" content="Slušajte Radio Elena 24/7!" />
    <meta property="og:image" content="logo.png" />
    <meta name="theme-color" content="#1db954" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .player {
            max-width: 380px;
            width: 100%;
            background: linear-gradient(145deg, #1e1e2a, #14141e);
            border-radius: 24px;
            padding: 28px 24px 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            text-align: center;
        }

        /* --- COVER SLIKA --- */
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 16px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #2a1f3a, #1a1228);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* --- INFO --- */
        .title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-top: 4px;
        }

        .artist {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            margin: 2px 0 4px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #1db954;
            font-weight: 600;
            margin: 6px 0 16px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #1db954;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- KONTROLE (Spotify stil) --- */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 12px 0 4px;
        }

        .controls button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
        }

        .controls button:active {
            transform: scale(0.92);
        }

        .controls .play-btn {
            background: #1db954;
            color: #fff;
            font-size: 26px;
            width: 60px;
            height: 60px;
            box-shadow: 0 8px 24px rgba(29, 185, 84, 0.3);
        }

        .controls .play-btn:hover {
            background: #1ed760;
            transform: scale(1.04);
            box-shadow: 0 8px 32px rgba(29, 185, 84, 0.4);
        }

        .controls .play-btn.playing {
            background: #1db954;
            box-shadow: 0 8px 24px rgba(29, 185, 84, 0.3);
        }

        /* --- PROGRESS BAR --- */
        .progress {
            margin: 14px 0 6px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1db954;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 4px;
        }

        /* --- FOOTER --- */
        .footer {
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 13px;
        }

        .footer .heart {
            color: #ff2ea6;
        }

        /* --- SHARE --- */
        .share-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .share-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .share-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            vertical-align: middle;
            margin-right: 4px;
        }

        /* --- LOADING --- */
        .loading {
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            margin: 4px 0 8px;
            display: none;
        }
        .loading.show {
            display: block;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        @media (max-width: 400px) {
            .player { padding: 20px 16px 24px; }
            .cover { width: 160px; height: 160px; font-size: 56px; }
            .title { font-size: 18px; }
            .controls .play-btn { width: 52px; height: 52px; font-size: 22px; }
            .controls button { width: 40px; height: 40px; font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="player">

    <!-- Cover -->
    <div class="cover">
        <span>🎵</span>
        <!-- <img src="logo.png" alt="Radio Elena" /> -->
    </div>

    <!-- Info -->
    <div class="title">Radio Elena</div>
    <div class="artist">Uživo 24/7</div>

    <div class="status">
        <span class="dot"></span> UŽIVO
    </div>

    <!-- Loading -->
    <div class="loading" id="loadingMsg">⏳ Povezivanje...</div>

    <!-- Kontrole -->
    <div class="controls">
        <button id="prevBtn">⏮</button>
        <button id="playBtn" class="play-btn">▶</button>
        <button id="nextBtn">⏭</button>
    </div>

    <!-- Progress -->
    <div class="progress">
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Slušaj Radio Elena gde god da si <span class="heart">❤️</span>
    </div>

    <!-- Share -->
    <button class="share-btn" id="shareBtn">
        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
        Podeli
    </button>

</div>

<script>
    // === AUDIO ===
    const streamUrl = 'https://stream1.srvnetplus.com:18153/stream';
    const audio = new Audio(streamUrl);

    // === DOM ===
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const loadingMsg = document.getElementById('loadingMsg');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const progressBar = document.getElementById('progressBar');

    let isPlaying = false;
    let isLoaded = false;

    // === PLAY/PAUSE ===
    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.textContent = '▶';
            playBtn.classList.remove('playing');
            isPlaying = false;
        } else {
            loadingMsg.classList.add('show');
            audio.play().then(() => {
                loadingMsg.classList.remove('show');
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
                isPlaying = true;
            }).catch(() => {
                loadingMsg.classList.remove('show');
                if (confirm('Ne može se povezati. Otvori u novom prozoru?')) {
                    window.open(streamUrl, '_blank');
                }
            });
        }
    }

    playBtn.addEventListener('click', togglePlay);

    // === PROGRESS ===
    audio.addEventListener('timeupdate', function() {
        if (this.duration) {
            const percent = (this.currentTime / this.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(this.currentTime);
            totalTimeEl.textContent = formatTime(this.duration);
        }
    });

    function formatTime(sec) {
        if (!sec || isNaN(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // === KLIK NA PROGRESS ===
    progressBar.addEventListener('click', function(e) {
        if (!audio.duration) return;
        const rect = this.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        audio.currentTime = percent * audio.duration;
    });

    // === PREV/NEXT (restart) ===
    prevBtn.addEventListener('click', function() {
        audio.currentTime = 0;
        if (!isPlaying) { audio.play(); playBtn.textContent = '⏸'; playBtn.classList.add('playing'); isPlaying = true; }
    });
    nextBtn.addEventListener('click', function() {
        audio.currentTime = 0;
        if (!isPlaying) { audio.play(); playBtn.textContent = '⏸'; playBtn.classList.add('playing'); isPlaying = true; }
    });

    // === AUTO-PLAY ===
    window.addEventListener('load', function() {
        setTimeout(() => {
            audio.play().then(() => {
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
                isPlaying = true;
            }).catch(() => {});
        }, 800);
    });

    // === SHARE ===
    document.getElementById('shareBtn').addEventListener('click', function() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: 'Radio Elena', text: '🎵 Slušajte Radio Elena 24/7!', url: url }).catch(() => {});
        } else {
            navigator.clipboard.writeText(url).then(() => alert('✅ Link je kopiran!')).catch(() => prompt('Kopiraj link:', url));
        }
    });

    // Space shortcut
    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space' && !e.target.matches('input, textarea, button')) {
            e.preventDefault();
            togglePlay();
        }
    });
</script>

</body>
</html>
