<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Radio Elena</title>
    
    <meta property="og:title" content="Radio Elena" />
    <meta property="og:description" content="Slušajte Radio Elena 24/7!" />
    <meta name="theme-color" content="#1db954" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .player {
            max-width: 380px;
            width: 100%;
            background: linear-gradient(145deg, #1e1e2a, #14141e);
            border-radius: 24px;
            padding: 28px 24px 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Cover sa animacijom */
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 16px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #2a1f3a, #1a1228);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* KROTACIJA KADA SVIRA */
        .cover.spinning {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Trenutna pesma */
        .now-playing {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-top: 2px;
        }

        .artist {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.4);
            margin: 2px 0 4px;
        }

        /* Status + Slušaoci */
        .status-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 6px 0 14px;
            flex-wrap: wrap;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #1db954;
            font-weight: 600;
        }

        .listeners {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .listeners span {
            color: #fff;
            font-weight: 700;
            font-size: 14px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #1db954;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Kontrole */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 8px 0 4px;
        }

        .controls button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
        }

        .controls button:active {
            transform: scale(0.92);
        }

        .controls .play-btn {
            background: #1db954;
            color: #fff;
            font-size: 26px;
            width: 60px;
            height: 60px;
            box-shadow: 0 8px 24px rgba(29, 185, 84, 0.3);
        }

        .controls .play-btn:hover {
            background: #1ed760;
            transform: scale(1.04);
        }

        .controls .play-btn.playing {
            background: #1db954;
        }

        /* Progress */
        .progress {
            margin: 12px 0 4px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1db954;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 4px;
        }

        /* Loading */
        .loading {
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            margin: 4px 0 8px;
            display: none;
        }
        .loading.show {
            display: block;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* Footer */
        .footer {
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.12);
            font-size: 13px;
        }

        .footer .heart {
            color: #ff2ea6;
        }

        /* === DUGME ZA SHARE === */
        .share-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .share-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateY(-2px);
        }

        .share-btn:active {
            transform: scale(0.95);
        }

        .share-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .share-btn.instagram svg {
            fill: #E4405F;
        }

        .share-btn.instagram:hover svg {
            fill: #fff;
        }

        .share-btn.facebook svg {
            fill: #1877F2;
        }

        .share-btn.facebook:hover svg {
            fill: #fff;
        }

        .share-btn.copy svg {
            fill: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 400px) {
            .player { padding: 20px 16px 24px; }
            .cover { width: 160px; height: 160px; font-size: 56px; }
            .title { font-size: 18px; }
            .controls .play-btn { width: 52px; height: 52px; font-size: 22px; }
            .controls button { width: 40px; height: 40px; font-size: 18px; }
            .share-btn { font-size: 11px; padding: 6px 14px; }
            .status-row { gap: 12px; }
        }
    </style>
</head>
<body>

<div class="player">

    <!-- Cover sa SLIKOM -->
    <div class="cover" id="cover">
        <img src="logo.png" alt="Radio Elena" onerror="this.style.display='none'; this.parentElement.innerHTML='🎵'" />
    </div>

    <!-- Trenutna pesma -->
    <div class="now-playing">TRENUTNO NA RADIJU</div>
    <div class="title" id="songTitle">Radio Elena</div>
    <div class="artist" id="artistName">Uživo 24/7</div>

    <!-- Status + Slušaoci -->
    <div class="status-row">
        <div class="status">
            <span class="dot"></span> UŽIVO
        </div>
        <div class="listeners">
            👥 <span id="listenerCount">12</span> slušalaca
        </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loadingMsg">⏳ Povezivanje...</div>

    <!-- Kontrole -->
    <div class="controls">
        <button id="prevBtn">⏮</button>
        <button id="playBtn" class="play-btn">▶</button>
        <button id="nextBtn">⏭</button>
    </div>

    <!-- Progress -->
    <div class="progress">
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="totalTime">--:--</span>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Slušaj Radio Elena gde god da si <span class="heart">❤️</span>
    </div>

    <!-- === DUGMAD ZA SHARE === -->
    <div class="share-row">

        <!-- Instagram -->
        <button class="share-btn instagram" id="shareInstagram">
            <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            Instagram
        </button>

        <!-- Facebook -->
        <button class="share-btn facebook" id="shareFacebook">
            <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
        </button>

        <!-- Kopiraj link -->
        <button class="share-btn copy" id="shareCopy">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            Kopiraj link
        </button>

    </div>

</div>

<script>
    // === AUDIO ===
    const streamUrl = 'https://stream1.srvnetplus.com:18153/stream';
    const audio = new Audio(streamUrl);

    // === DOM ===
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const loadingMsg = document.getElementById('loadingMsg');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const progressBar = document.getElementById('progressBar');
    const songTitle = document.getElementById('songTitle');
    const artistName = document.getElementById('artistName');
    const cover = document.getElementById('cover');
    const listenerCount = document.getElementById('listenerCount');

    let isPlaying = false;

    // === PESME ===
    const songs = [
        { title: 'Stakleno Srce', artist: 'Darkobokica' },
        { title: 'Kraj starog mosta', artist: 'Darkobokica' },
        { title: 'Radio Elena LIVE', artist: 'Uživo 24/7' }
    ];
    let currentSongIndex = 0;

    function updateSong() {
        const song = songs[currentSongIndex % songs.length];
        songTitle.textContent = song.title;
        artistName.textContent = song.artist;
    }

    // === BROJ SLUŠALACA (LIVE) ===
    function updateListeners() {
        // Menja se između 8 i 25 slušalaca
        const count = Math.floor(Math.random() * 18) + 8;
        listenerCount.textContent = count;
    }

    // Menja se na svakih 5 sekundi
    setInterval(updateListeners, 5000);

    // === PLAY/PAUSE ===
    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.textContent = '▶';
            playBtn.classList.remove('playing');
            cover.classList.remove('spinning');
            isPlaying = false;
        } else {
            loadingMsg.classList.add('show');
            audio.play().then(() => {
                loadingMsg.classList.remove('show');
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
                cover.classList.add('spinning');
                isPlaying = true;
            }).catch(() => {
                loadingMsg.classList.remove('show');
                if (confirm('Ne može se povezati. Otvori u novom prozoru?')) {
                    window.open(streamUrl, '_blank');
                }
            });
        }
    }

    playBtn.addEventListener('click', togglePlay);

    // === PROGRESS ===
    audio.addEventListener('timeupdate', function() {
        if (this.duration && !isNaN(this.duration)) {
            const percent = (this.currentTime / this.duration) * 100;
            progressFill.style.width = Math.min(percent, 100) + '%';
            currentTimeEl.textContent = formatTime(this.currentTime);
            totalTimeEl.textContent = formatTime(this.duration);
        } else {
            currentTimeEl.textContent = formatTime(this.currentTime);
            totalTimeEl.textContent = '--:--';
        }
    });

    function formatTime(sec) {
        if (!sec || isNaN(sec) || !isFinite(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // === KLIK NA PROGRESS ===
    progressBar.addEventListener('click', function(e) {
        if (!audio.duration || isNaN(audio.duration)) return;
        const rect = this.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        audio.currentTime = percent * audio.duration;
    });

    // === PREV/NEXT ===
    prevBtn.addEventListener('click', function() {
        currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
        updateSong();
        audio.currentTime = 0;
        if (!isPlaying) { 
            audio.play(); 
            playBtn.textContent = '⏸'; 
            playBtn.classList.add('playing');
            cover.classList.add('spinning');
            isPlaying = true; 
        }
    });

    nextBtn.addEventListener('click', function() {
        currentSongIndex = (currentSongIndex + 1) % songs.length;
        updateSong();
        audio.currentTime = 0;
        if (!isPlaying) { 
            audio.play(); 
            playBtn.textContent = '⏸'; 
            playBtn.classList.add('playing');
            cover.classList.add('spinning');
            isPlaying = true; 
        }
    });

    // === AUTO-PLAY ===
    window.addEventListener('load', function() {
        updateSong();
        updateListeners();
        setTimeout(() => {
            audio.play().then(() => {
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
                cover.classList.add('spinning');
                isPlaying = true;
            }).catch(() => {});
        }, 800);
    });

    // === SHARE DUGMAD ===

    // 1. Instagram
    document.getElementById('shareInstagram').addEventListener('click', function() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({
                title: 'Radio Elena',
                text: '🎵 Slušajte Radio Elena 24/7! 📻',
                url: url
            }).catch(() => {});
        } else {
            // Fallback - kopiraj link
            copyToClipboard(url);
        }
    });

    // 2. Facebook
    document.getElementById('shareFacebook').addEventListener('click', function() {
        const url = window.location.href;
        const shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
        window.open(shareUrl, '_blank', 'width=600,height=400');
    });

    // 3. Kopiraj link
    document.getElementById('shareCopy').addEventListener('click', function() {
        const url = window.location.href;
        copyToClipboard(url);
    });

    function copyToClipboard(text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Link je kopiran!');
            }).catch(() => {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showToast('✅ Link je kopiran!');
        } catch (e) {
            prompt('Kopiraj link:', text);
        }
        document.body.removeChild(textarea);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 999;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeUp 2s ease;
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 2500);
    }

    // Style za toast
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
    `;
    document.head.appendChild(style);

    // Space shortcut
    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space' && !e.target.matches('input, textarea, button')) {
            e.preventDefault();
            togglePlay();
        }
    });
</script>

</body>
</html>
