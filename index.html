<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Elena</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #070710, #0a0a1a);
    color: white;
    text-align: center;
}

.header {
    padding: 50px 20px;
}

.header h1 {
    font-size: 60px;
    color: #ff2ea6;
    text-shadow: 0 0 30px #ff2ea6, 0 0 60px #ff2ea6;
}

.status {
    color: #00ffc8;
    margin-top: 10px;
}

.main-box {
    max-width: 800px;
    margin: 40px auto;
    padding: 40px;
    border-radius: 25px;
    background: rgba(20,20,40,0.7);
    box-shadow: 0 0 40px rgba(255,46,166,0.5);
}

.player-placeholder {
    height: 150px;
    border-radius: 15px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    border: 2px dashed #ff2ea6;
}

.buttons {
    margin-top: 30px;
}

.btn {
    padding: 15px 30px;
    margin: 10px;
    background: #ff2ea6;
    border-radius: 30px;
    color: white;
    font-size: 18px;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 20px #ff2ea6;
}

.footer {
    margin-top: 40px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
    <h1>🎧 RADIO ELENA</h1>
    <div class="status">🔴 UŽIVO 24/7</div>
</div>

<div class="main-box">

    <div class="player-placeholder" id="statusText">
        🎵 Klikni PLAY da pokreneš radio
    </div>

    <div class="buttons">
        <button class="btn" onclick="playRadio()">▶ PUSTI</button>
        <button class="btn" onclick="stopRadio()">⏸ STOP</button>
    </div>

</div>

<div class="footer">
    Slušaj Radio Elena gde god da si ❤️
</div>

<script>
const audio = new Audio();

function playRadio() {
    audio.src = "https://corsproxy.io/?http://stream1.srvnetplus.com:8153/stream";
    audio.play();
    document.getElementById("statusText").innerText = "🔊 Radio svira...";
}

function stopRadio() {
    audio.pause();
    document.getElementById("statusText").innerText = "⏸ Zaustavljeno";
}
</script>

</body>
</html>
