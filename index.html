<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Elena</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
    text-align: center;
}

/* HEADER */
h1 {
    margin-top: 40px;
    font-size: 40px;
    color: #ff2ea6;
    text-shadow: 0 0 20px #ff2ea6;
}

/* STATUS */
.live {
    color: #00ffcc;
    margin-bottom: 20px;
}

/* PLAYER BOX */
.player-box {
    background: #0d0d1f;
    margin: 30px auto;
    padding: 30px;
    width: 320px;
    border-radius: 20px;
    box-shadow: 0 0 30px #ff2ea6;
}

/* SLIKA */
.cover {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* NAZIV PESME */
.song {
    color: #ff2ea6;
    margin-bottom: 10px;
}

/* AUDIO */
audio {
    width: 100%;
}

/* FOOTER */
.footer {
    margin-top: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>🎧 RADIO ELENA</h1>
<div class="live">🔴 UŽIVO 24/7</div>

<div class="player-box">

    <!-- SLIKA -->
    <img src="https://i.imgur.com/8Km9tLL.jpg" class="cover">

    <!-- PESMA -->
    <div class="song">🎵 Radio Elena LIVE</div>

    <!-- PLAYER -->
    <audio controls autoplay>
        <source src="https://stream1.srvnetplus.com:18153/stream" type="audio/mpeg">
    </audio>

</div>

<div class="footer">
Slušaj Radio Elena gde god da si ❤️
</div>

</body>
</html>
