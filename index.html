<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Elena</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
    text-align: center;
}

/* HEADER */
h1 {
    margin-top: 40px;
    font-size: 40px;
    color: #ff2ea6;
    text-shadow: 0 0 20px #ff2ea6;
}

/* STATUS */
.live {
    color: #00ffcc;
    margin-bottom: 20px;
}

/* PLAYER BOX */
.player-box {
    background: #0d0d1f;
    margin: 30px auto;
    padding: 30px;
    width: 320px;
    border-radius: 20px;
    box-shadow: 0 0 30px #ff2ea6;
}

/* SLIKA */
.cover {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* NAZIV PESME */
.song {
    color: #ff2ea6;
    margin-bottom: 10px;
}

/* AUDIO */
audio {
    width: 100%;
}

/* FOOTER */
.footer {
    margin-top: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>🎧 RADIO ELENA</h1>
<div style="color:#00ffcc;">🔴 UŽIVO 24/7</div>

<div style="
    max-width:400px;
    margin:40px auto;
    background:#0d0d1f;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 40px #ff2ea6;
">

    <img src="https://i.imgur.com/8Km9tLL.jpg" style="
        width:100%;
        border-radius:15px;
    ">

    <h3 style="color:#ff2ea6;margin:15px 0;">
        🎵 Radio Elena LIVE
    </h3>

    <!-- PRO PLAYER -->
    <audio id="radio" autoplay>
        <source src="https://stream1.srvnetplus.com:18153/stream" type="audio/mpeg">
    </audio>

    <!-- CUSTOM CONTROLS -->
    <div style="margin-top:20px;">

        <button onclick="playRadio()" style="
            background:#ff2ea6;
            border:none;
            padding:12px 20px;
            border-radius:30px;
            color:white;
            font-size:16px;
            margin-right:10px;
            cursor:pointer;
        ">▶ PUSTI</button>

        <button onclick="stopRadio()" style="
            background:#222;
            border:none;
            padding:12px 20px;
            border-radius:30px;
            color:white;
            font-size:16px;
            cursor:pointer;
        ">⏸ STOP</button>

    </div>

</div>

<p style="opacity:0.7;">
Slušaj Radio Elena gde god da si ❤️
</p>

<script>
function playRadio(){
    document.getElementById("radio").play();
}
function stopRadio(){
    document.getElementById("radio").pause();
}
</script>

</body>
</html>
